name: Selenium Cucumber Tests

on:
  push:
    branches: [ "main", "master", "Prueba1" ]
  pull_request:
    branches: [ "main", "master", "Prueba1" ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests (Login → PIM → Admin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Login tests (first)
        id: login_tests
        continue-on-error: true
        run: mvn test -Dbrowser=chrome -Dcucumber.filter.tags='@login'
        env:
          CI: true

      - name: Run PIM tests (second)
        id: pim_tests
        continue-on-error: true
        run: mvn test -Dbrowser=chrome -Dcucumber.filter.tags='@pim or @pim-negativo'
        env:
          CI: true

      - name: Run Admin tests (third)
        id: admin_tests
        continue-on-error: true
        run: mvn test -Dbrowser=chrome -Dcucumber.filter.tags='@admin'
        env:
          CI: true

      - name: Fail job if tests failed
        if: always() && (steps.login_tests.outcome == 'failure' || steps.pim_tests.outcome == 'failure' || steps.admin_tests.outcome == 'failure')
        run: exit 1

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report.html
          retention-days: 30

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-json
          path: target/cucumber-report.json
          retention-days: 30

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
